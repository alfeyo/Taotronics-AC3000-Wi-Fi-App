publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  mqtt_client: ^10.2.1
  network_info_plus: ^6.0.1
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  crypto: ^3.0.3
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/original_setup/
